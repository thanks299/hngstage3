name: Test Workflow

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Test Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Run simple test
        run: |
          echo "GitHub Actions is working!"
          node --version
          npm --version
          ls -la
