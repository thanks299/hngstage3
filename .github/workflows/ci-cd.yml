name: Backend CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: # Manual trigger

env:
  NODE_VERSION: "18"

jobs:
  # ============================================
  # STAGE 1: TEST
  # ============================================
  test:
    name: 🧪 Stage 1 - Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5432 -U test_user; do
            echo "⏳ Waiting for PostgreSQL..."
            sleep 2
          done
          echo "✅ PostgreSQL is ready"

      - name: Setup test database
        run: |
          PGPASSWORD=test_pass psql -h localhost -U test_user -d test_db <<EOF
          CREATE EXTENSION IF NOT EXISTS "pgcrypto";
          \q
          EOF

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          NODE_ENV: test
        run: |
          if npm run migrate 2>/dev/null; then
          echo "✅ Migrations completed"
          else
          echo "⚠️ No migrations script found"
          fi

      - name: Run tests with coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          JWT_SECRET: test_secret_key_for_ci
          JWT_ACCESS_EXPIRY: 180
          JWT_REFRESH_EXPIRY: 300
          GITHUB_CLIENT_ID: test_client_id
          GITHUB_CLIENT_SECRET: test_client_secret
        run: |
          npm test -- --coverage --forceExit --runInBand

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # ============================================
  # STAGE 2: BUILD
  # ============================================
  build:
    name: 📦 Stage 2 - Build Application
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: |
          if npm run lint 2>/dev/null; then
            echo "✅ Linting passed"
          else
            echo "⚠️ No lint script found"
          fi

      - name: Build application
        run: |
          if npm run build 2>/dev/null; then
            echo "✅ Build completed"
          else
            echo "⚠️ No build script found, skipping..."
          fi

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r src deploy/
          cp -r scripts deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp server.js deploy/
          cp .env.example deploy/ 2>/dev/null || true
          cd deploy
          zip -r ../backend-deploy.zip .
          cd ..

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend-deploy.zip
          retention-days: 7

  # ============================================
  # STAGE 3: INTEGRATION TESTS
  # ============================================
  integration-test:
    name: 🔗 Stage 3 - Integration Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: integration_user
          POSTGRES_PASSWORD: integration_pass
          POSTGRES_DB: integration_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: ./artifacts

      - name: Extract deployment package
        run: |
          mkdir -p extracted
          cd extracted
          unzip ../artifacts/backend-deploy.zip
          ls -la

      - name: Setup integration database
        run: |
          sudo apt-get install -y postgresql-client
          PGPASSWORD=integration_pass psql -h localhost -U integration_user -d integration_db <<EOF
          CREATE EXTENSION IF NOT EXISTS "pgcrypto";
          \q
          EOF

      - name: Run integration tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          JWT_SECRET: integration_test_secret
          JWT_ACCESS_EXPIRY: 180
          JWT_REFRESH_EXPIRY: 300
          GITHUB_CLIENT_ID: test_client_id
          GITHUB_CLIENT_SECRET: test_client_secret
        run: |
          if npm run test:integration 2>/dev/null; then
            echo "✅ Integration tests passed"
          else
            echo "⚠️ No integration tests found, skipping..."
          fi

      - name: Start server and test health endpoint
        run: |
          node server.js &
          sleep 5
          curl -f http://localhost:3000/health || exit 1
          echo "✅ Server started successfully"

  # ============================================
  # STAGE 4: DEPLOY
  # ============================================
  deploy:
    name: 🚀 Stage 4 - Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, integration-test]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: ./artifacts

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "🚀 Triggering deployment on Render..."
          curl -X POST "https://api.render.com/deploy/${{ secrets.RENDER_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
          echo "✅ Deployment triggered!"

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for deployment to complete..."
          sleep 30

      - name: Verify deployment
        run: |
          BACKEND_URL="https://hngstage3.onrender.com"
          echo "🔍 Verifying deployment at $BACKEND_URL"

          # Health check
          curl -f "$BACKEND_URL/health" || exit 1
          echo "✅ Health check passed"

          # Auth endpoint check
          curl -f "$BACKEND_URL/auth/github" || exit 1
          echo "✅ Auth endpoint responding"

      - name: Notification on success
        if: success()
        run: |
          echo "🎉 Deployment successful!"
          echo "📡 Backend URL: https://hngstage3.onrender.com"

      - name: Notification on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          exit 1

  # ============================================
  # OPTIONAL: Notifications
  # ============================================
  notify:
    name: 📧 Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Send Slack notification
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
              -H 'Content-Type: application/json' \
              -d '{
                "text": "Backend Pipeline Status: ${{ needs.deploy.result }}",
                "blocks": [{
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pipeline Status:* ${{ needs.deploy.result }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }]
              }'
          else
            echo "No Slack webhook configured"
          fi
